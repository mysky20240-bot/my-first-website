<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안녕하세요 👋</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 50px 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .avatar { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 2rem; color: #333; margin-bottom: 10px; }
    p { color: #666; font-size: 1.05rem; line-height: 1.7; margin-bottom: 14px; }
    .badge {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      margin: 4px;
    }
    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">🚀</div>
    <h1>안녕하세요!</h1>
    <p>저는 새로운 것을 배우고 만드는 것을 좋아하는 개발자입니다.<br>이 페이지에 방문해 주셔서 감사합니다.</p>
    <p>현재 웹 개발을 공부하며 멋진 서비스를 만들기 위해 노력하고 있습니다.</p>
    <div>
      <span class="badge">HTML</span>
      <span class="badge">CSS</span>
      <span class="badge">JavaScript</span>
      <span class="badge">GitHub</span>
    </div>
  </div>
</body>
</html>
